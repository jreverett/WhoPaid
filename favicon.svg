  <line x1="9" y1="13" x2="20" y2="13" stroke="#2c2c2c" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="9" y1="17" x2="21" y2="17" stroke="#2c2c2c" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="9" y1="21" x2="18" y2="21" stroke="#2c2c2c" stroke-width="1.3" stroke-linecap="round"/>

