  <path d="M24 3 L29 3 L29 8" fill="none" stroke="#d4380d" stroke-width="2" stroke-linecap="round"/>
  <path d="M29 24 L29 29 L24 29" fill="none" stroke="#d4380d" stroke-width="2" stroke-linecap="round"/>
  <path d="M8 29 L3 29 L3 24" fill="none" stroke="#d4380d" stroke-width="2" stroke-linecap="round"/>
</svg>
