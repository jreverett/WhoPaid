[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["satori", "@resvg/resvg-js", "@libsql/client"]
  included_files = ["netlify/functions/fonts/**"]

[[edge_functions]]
  path = "/r/*"
  function = "og-receipt"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/r/*"
  to = "/index.html"
  status = 200
